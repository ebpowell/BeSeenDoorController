services:
  keymanagement:
    #image: key-management-app:latest
    image: ghcr.io/ebpowell/beseendoorcontroller/key-management-app:latest
    container_name: keymanagement
    restart: unless-stopped
    volumes:
      - /opt/data/door_controller/data:/app/data
      - /opt/data/door_controller/config:/app/config
      - /opt/data/door_controller/log:/app/log
      # Make sure container and host use the ame Timezone
      - /etc/localtime:/etc/localtime:ro
 #     - /etc/timezone:/etc/timezone:ro

    environment:
      # Tell your app where to find config files
      APP_CONFIG_DIR: /app/config
      # APP_MODE: production
      TZ: America/New_York

    # Set the user to run processes inside the container
    user: doorcontroller

    ports:
      - "5000:5000"
    command: ["BeSeen_web"]

    depends_on:
      - postgres

  doorcontroller:
    #image: cli-synch-tools:latest
    image: ghcr.io/ebpowell/beseendoorcontroller/cli-synch-tools:latest
    container_name: cli-synch-tools
    restart: unless-stopped
    volumes:
      - /opt/data/door_controller/data:/app/data
      - /opt/data/door_controller/config:/app/config
      - /opt/data/door_controller/log:/app/log
      # Make sure container and host use the ame Timezone
      - /etc/localtime:/etc/localtime:ro
 #     - /etc/timezone:/etc/timezone:ro

    environment:
      # Tell your app where to find config files
      APP_CONFIG_DIR: /app/config
      # APP_MODE: production
      TZ: America/New_York

    # Set the user to run processes inside the container
    user: doorcontroller

    # Run synchronization daemon on startup
    command: ["sync_controller", "--daemon"]
    depends_on:
      - postgres

  postgres:
    image: ghcr.io/ebpowell/beseendoorcontroller/postgres:sha-1412556
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: postgres
    restart: always
    ports:
      - 5432:5432
    volumes:
      - /mnt/sda1/postgresql:/var/lib/postgresql/data
#      - /opt/postgresql:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d/
      # Make sure container and host use the ame Timezone
      - /etc/localtime:/etc/localtime:ro
#      - /etc/timezone:/etc/timezone:ro
      - /opt/data/door_controller/config:/app/config

    environment:
      - TZ=America/New_York
      - PGTZ=America/New_York
      - APP_CONFIG_DIR=/app/config
      - POSTGRES_PASSWORD=ww_s3cret
      - POSTGRES_USER=wentworth_user
      - POSTGRES_DB=wntworth_db

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /opt/data/door_controller/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/New_York
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - postgres

